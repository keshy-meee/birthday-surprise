<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Private Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    height:100vh;
    overflow:hidden;
    font-family:Inter;
    background: linear-gradient(-45deg,#eef2ff,#f7f7fb,#eef6ff,#f3f4f6);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

/* background animation */
@keyframes gradientMove {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* canvas particles */
canvas {
    position:fixed;
    top:0;left:0;
    z-index:0;
}

/* CENTER WRAPPER */
.wrapper {
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOCK */
.lock {
    width:360px;
    padding:40px;
    background:rgba(255,255,255,0.8);
    backdrop-filter: blur(14px);
    border-radius:20px;
    box-shadow:0 30px 80px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.6s;
}

.lockIcon {
    width:70px;
    height:70px;
    margin:auto;
    border-radius:18px;
    background:linear-gradient(135deg,#4f6cff,#6a8bff);
    position:relative;
    transform-style:preserve-3d;
    animation: float 3s ease-in-out infinite;
}

.lockIcon:before {
    content:"";
    position:absolute;
    width:28px;
    height:18px;
    border:3px solid white;
    border-top:none;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    border-radius:0 0 8px 8px;
}

.lockIcon:after {
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    border:3px solid white;
    border-bottom:none;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    border-radius:10px 10px 0 0;
}

@keyframes float {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

input {
    margin-top:20px;
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    text-align:center;
}

button {
    margin-top:14px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#4f6cff;
    color:white;
    font-weight:600;
    cursor:pointer;
}

/* shake */
.shake {animation:shake .4s;}
@keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
}

/* SCENES */
#scene2 {display:none;}

/* ENVELOPE */
.envelope {
    width:280px;
    height:180px;
    background:white;
    border-radius:14px;
    position:relative;
    cursor:pointer;
    box-shadow:0 30px 80px rgba(0,0,0,0.1);
    transition:0.6s;
}

.envelope:before {
    content:"";
    position:absolute;
    top:0;
    width:100%;
    height:50%;
    background:#eef2ff;
    clip-path: polygon(0 0,100% 0,50% 100%);
    transition:0.6s;
}

/* LETTER */
.letter {
    position:absolute;
    width:85%;
    left:50%;
    transform:translate(-50%,30px);
    opacity:0;
    transition:0.6s;
    background:white;
    padding:20px;
    border-radius:10px;
}

.envelope.open {
    height:340px;
}

.envelope.open .letter {
    opacity:1;
    transform:translate(-50%,-10px);
}

/* PAPER STYLE */
.paperTitle {
    font-family:"Playfair Display";
    font-size:22px;
    margin-bottom:12px;
}

.paperText {
    font-size:14px;
    line-height:1.7;
    color:#444;
}

/* fade transition */
.fadeOut {
    opacity:0;
    transform:scale(0.95);
    transition:0.5s;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrapper">

<!-- LOCK -->
<div id="scene1" class="lock">
    <div class="lockIcon"></div>
    <h2 style="margin-top:15px;">Private Access</h2>
    <p style="font-size:13px;color:#666;">Enter code to continue</p>

    <input type="password" id="code">
    <button onclick="unlock()">Unlock</button>
</div>

<!-- ENVELOPE SCENE -->
<div id="scene2">
    <div class="envelope" id="env" onclick="openLetter()">
        <div class="letter">
            <div class="paperTitle">Happy Birthday ❤️</div>
            <div class="paperText">
                This is not just a message.<br><br>

                It’s something meant to feel like you’re opening a real letter.<br><br>

                I hope today gives you peace in ways you don’t expect.<br><br>

                You matter more than you realize.
            </div>
        </div>
    </div>
</div>

</div>

<script>
const SECRET="040511";

/* SOUND */
function beep(freq,duration){
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value=freq;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+duration);
    osc.stop(ctx.currentTime+duration);
}

/* UNLOCK */
function unlock(){
    const input=document.getElementById("code");
    const scene1=document.getElementById("scene1");

    if(input.value===SECRET){
        beep(600,0.2);

        scene1.classList.add("fadeOut");

        setTimeout(()=>{
            scene1.style.display="none";
            document.getElementById("scene2").style.display="block";
        },500);

    }else{
        beep(200,0.2);
        scene1.classList.add("shake");
        setTimeout(()=>scene1.classList.remove("shake"),400);
    }
}

/* ENVELOPE */
function openLetter(){
    beep(800,0.1);
    document.getElementById("env").classList.toggle("open");
}

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(100,120,255,0.15)";
    for(let p of particles){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y+=p.d;
        if(p.y>canvas.height)p.y=0;
    }
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
