<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0f0f0f;
    color: #f5f5f5;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* LOGIN */
#login {
    text-align: center;
    opacity: 1;
    transition: 0.8s;
}

input {
    margin-top: 15px;
    padding: 12px;
    width: 220px;
    background: transparent;
    border: 1px solid #555;
    color: white;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #d4af37;
    border: none;
    color: black;
    cursor: pointer;
}

/* ENVELOPE */
#envelope {
    display: none;
    width: 300px;
    height: 200px;
    background: #1a1a1a;
    position: relative;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* LETTER */
#letter {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: #fafafa;
    color: black;
    padding: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

/* FINAL TEXT */
#final {
    display: none;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    text-align: center;
}
</style>
</head>

<body>

<div id="login">
    <h2>Enter Your Birthday</h2>
    <input type="password" id="bday" placeholder="DDMMYY">
    <br>
    <button onclick="check()">Enter</button>
</div>

<div id="envelope" onclick="openLetter()"></div>

<div id="letter">
    <p id="message"></p>
</div>

<div id="final">
    Happy Birthday ❤️
</div>

<script>
function check() {
    let input = document.getElementById("bday").value;

    if(input === "040511") {
        document.getElementById("login").style.opacity = "0";
        
        setTimeout(() => {
            document.getElementById("login").style.display = "none";
            document.getElementById("envelope").style.display = "block";
        }, 800);
    } else {
        alert("Wrong birthday");
    }
}

function openLetter() {
    let letter = document.getElementById("letter");
    letter.style.opacity = "1";
    letter.style.transform = "translateY(-150px)";

    let text = "You deserve a day as beautiful as your smile. Thank you for being part of my life.";

    let i = 0;
    let speed = 40;

    function type() {
        if(i < text.length) {
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }

    type();

    setTimeout(() => {
        document.getElementById("final").style.display = "block";
    }, 6000);
}
</script>

</body>
</html>
