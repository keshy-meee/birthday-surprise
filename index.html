<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #f4f6fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* SCREEN WRAPPER */
.screen {
    width: 100%;
    max-width: 420px;
}

/* CARD BASE */
.card {
    background: white;
    border-radius: 18px;
    padding: 36px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.08);
    text-align: center;
}

/* LOCK */
.lock-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
}

.lock-sub {
    color: #777;
    font-size: 14px;
}

input {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    text-align: center;
    outline: none;
}

button {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #4f6cff;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

/* shake only when wrong */
.shake {
    animation: shake 0.35s;
}

@keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
}

/* ENVELOPE */
#envelopeScene {
    display: none;
    text-align: center;
}

.envelope {
    width: 260px;
    height: 160px;
    margin: auto;
    background: white;
    border-radius: 14px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.1);
    position: relative;
    cursor: pointer;
    transition: 0.6s ease;
}

/* flap */
.envelope:before {
    content: "";
    position: absolute;
    top: 0;
    width: 100%;
    height: 50%;
    background: #eef1f7;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
}

/* letter */
.letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 20px);
    width: 85%;
    opacity: 0;
    transition: 0.6s ease;
    text-align: left;
}

/* OPEN STATE */
.envelope.open {
    height: 320px;
}

.envelope.open .letter {
    opacity: 1;
    transform: translate(-50%, -10px);
}

.title {
    font-weight: 700;
    margin-bottom: 10px;
}

.message {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
}
</style>
</head>

<body>

<div class="screen">

    <!-- LOCK -->
    <div id="lockScreen" class="card">
        <div class="lock-title">Private Access</div>
        <div class="lock-sub">Enter the code to continue</div>

        <input type="password" id="code" placeholder="Enter code">
        <button onclick="unlock()">Unlock</button>
    </div>

    <!-- ENVELOPE -->
    <div id="envelopeScene">
        <div class="envelope" id="envelope" onclick="openEnvelope()">
            <div class="letter">
                <div class="title">Happy Birthday ❤️</div>
                <div class="message">
                    This is something I made just for you.<br><br>

                    Not loud, not flashy — just something real.<br><br>

                    I hope you feel appreciated today, even in the quiet moments.<br><br>

                    You matter more than you think.
                    <br><br>
                    — me
                </div>
            </div>
        </div>
    </div>

</div>

<script>
const SECRET = "040511";

function unlock() {
    const input = document.getElementById("code");
    const lock = document.getElementById("lockScreen");

    if (input.value === SECRET) {
        lock.style.opacity = "0";
        lock.style.transform = "scale(0.95)";
        setTimeout(() => {
            lock.style.display = "none";
            document.getElementById("envelopeScene").style.display = "block";
        }, 350);
    } else {
        lock.classList.add("shake");
        setTimeout(() => lock.classList.remove("shake"), 350);
    }
}

function openEnvelope() {
    document.getElementById("envelope").classList.toggle("open");
}
</script>

</body>
</html>
