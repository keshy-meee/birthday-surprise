<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #f5f5f5;

    /* premium spotlight background */
    background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 70%);
}

/* SHARED CARD STYLE */
#login, #envelope-container, #final {
    text-align: center;
    padding: 40px;
    border-radius: 16px;

    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);

    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

/* LOGIN */
#login {
    transition: 0.8s;
}

input {
    margin-top: 15px;
    padding: 12px;
    width: 240px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    border-radius: 8px;
    outline: none;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 12px 26px;
    background: linear-gradient(135deg, #d4af37, #f5d76e);
    border: none;
    color: black;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 500;
}

/* ENVELOPE */
#envelope {
    width: 320px;
    height: 200px;
    margin: auto;
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border-radius: 12px;
    position: relative;
    box-shadow: 0 25px 70px rgba(0,0,0,0.8);
    cursor: pointer;
    transition: 0.4s;
    display: none;
}

#envelope:hover {
    transform: translateY(-6px);
}

/* LETTER */
#letter {
    margin-top: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: 1s ease;
    color: #111;
    background: #f7f3e8;
    padding: 25px;
    border-radius: 12px;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* FINAL SCREEN */
#final {
    display: none;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Enter Your Birthday</h2>
    <input type="password" id="bday" placeholder="DDMMYY">
    <br>
    <button onclick="check()">Enter</button>
</div>

<!-- ENVELOPE -->
<div id="envelope" onclick="openLetter()"></div>

<!-- LETTER -->
<div id="letter">
    <p id="message"></p>
</div>

<!-- FINAL -->
<div id="final">
    Happy Birthday ❤️
</div>

<script>
function check() {
    let input = document.getElementById("bday").value;

    if(input === "040511") {
        document.getElementById("login").style.opacity = "0";

        setTimeout(() => {
            document.getElementById("login").style.display = "none";
            document.getElementById("envelope").style.display = "block";
        }, 800);
    } else {
        alert("Wrong birthday");
    }
}

function openLetter() {
    let letter = document.getElementById("letter");
    let message = document.getElementById("message");

    letter.style.opacity = "1";
    letter.style.transform = "translateY(-120px)";

    let text = "You deserve a day as beautiful as your smile. Thank you for being part of my life.";
    let i = 0;

    function type() {
        if(i < text.length) {
            message.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 35);
        }
    }

    type();

    setTimeout(() => {
        document.getElementById("final").style.display = "block";
    }, 5000);
}
</script>

</body>
</html>
