<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

/* Login Box */
.login {
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    margin-top: 10px;
    cursor: pointer;
    background: white;
    color: #ff4b6e;
}

/* Hidden Content */
.hidden {
    display: none;
}

/* Envelope */
.envelope {
    width: 200px;
    height: 120px;
    background: #fff;
    position: relative;
    margin: auto;
    cursor: pointer;
    border-radius: 10px;
}

.envelope:before {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 60px solid #ff4b6e;
    top: -60px;
    left: 0;
}

/* Letter */
.letter {
    width: 300px;
    height: 200px;
    background: #fff;
    color: #333;
    padding: 20px;
    border-radius: 10px;
    margin: 20px auto;
    display: none;
    animation: open 1s ease;
}

@keyframes open {
    from { transform: scale(0); }
    to { transform: scale(1); }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h2>Enter your birthday 🎂</h2>
    <input type="password" id="pass" placeholder="MMDDYY">
    <br>
    <button onclick="checkPass()">Unlock 💌</button>
</div>

<!-- ENVELOPE -->
<div class="hidden" id="envelopeBox">
    <h2>Click the letter ❤️</h2>
    <div class="envelope" onclick="openLetter()"></div>
</div>

<!-- LETTER -->
<div class="letter" id="letter">
    <h3>My Love 💖</h3>
    <p>
        Happy Birthday ❤️<br><br>
        I just want you to know how special you are to me.  
        You make my world brighter in ways I can’t explain.  
        Every moment with you is something I treasure.  
        <br><br>
        I love you more than words can say.  
        Always and forever 💕
    </p>
</div>

<script>
function checkPass() {
    const pass = document.getElementById("pass").value;
    
    if (pass === "040511") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("envelopeBox").style.display = "block";
    } else {
        alert("Hmm... that's not right ❤️");
    }
}

function openLetter() {
    document.getElementById("letter").style.display = "block";
}
</script>

</body>
</html>
